.stat-card {

    border-radius: var(--radius);

.stat-card.blue .value   { color: var(--blue); }
.stat-card.red .value    { color: var(--red); }
.stat-card.purple .value { color: var(--purple); }
.chart-container {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
}
.chart-container h2 {
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 1rem;
}
.chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
}
@media (max-width: 800px) {
    .chart-row { grid-template-columns: 1fr; }
}
canvas { width: 100% !important; }
footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
}
</style>

// ГўвЂќв‚¬ГўвЂќв‚¬ Summary cards ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬

    { label: 'Peak CPU',        value: summary.peakCpu + ' %',                cls: 'purple' },
    { label: 'Avg CPU',         value: summary.avgCpu + ' %',                 cls: 'purple' },
    { label: 'Peak Threads',    value: summary.peakThreads,                   cls: '' },

];

const cardsContainer = document.getElementById('summaryCards');
cards.forEach(c => {
    const div = document.createElement('div');
    div.className = 'stat-card ' + c.cls;

});

// ГўвЂќв‚¬ГўвЂќв‚¬ Overview (normalized) ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
// Normalize each series to 0-100% of its own max for a combined view
function normalize(arr) {
    const max = Math.max(...arr, 1);
    return arr.map(v => (v / max) * 100);
}

// Align throughput to metric timestamps via nearest-match
const alignedRps = memLabels.map(t => {
    let closest = throughput[0] || { rps: 0 };
    let minDist = Infinity;
    throughput.forEach(s => {
        const d = Math.abs(s.t - t);
        if (d < minDist) { minDist = d; closest = s; }
    });
    return closest.rps;
});

new Chart(document.getElementById('overviewChart'), {
    type: 'line',
    data: {
        labels: memLabels,
        datasets: [
            {
                label: 'CPU (% of peak)',
                data: normalize(metrics.map(m => m.cpu)),
                borderColor: '#f7a41d',
                tension: 0.3, pointRadius: 0, borderWidth: 2
            },
            {
                label: 'RAM (% of peak)',
                data: normalize(memWorking),
                borderColor: '#60a5fa',
                tension: 0.3, pointRadius: 0, borderWidth: 2
            },
            {
                label: 'RPS (% of peak)',
                data: normalize(alignedRps),
                borderColor: '#4ade80',
                tension: 0.3, pointRadius: 0, borderWidth: 2
            }
        ]
    },
    options: {
        ...chartDefaults,
        scales: {
            x: chartDefaults.scales.x,
            y: { ...makeScale('% of Peak'), min: 0, max: 105 }
        }
    }
});
