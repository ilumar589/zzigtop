<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
    --bg: #0a0a0f;
    --card-bg: #14141f;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-muted: #888898;
    --accent: #f7a41d;
    --accent-dim: #c07a10;
    --green: #4ade80;
    --blue: #60a5fa;
    --red: #f87171;
    --purple: #c084fc;
    --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 2rem;
    max-width: 1200px;
    margin: 0 auto;
}
header {
    text-align: center;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
}
header h1 {
    font-size: 2rem;
    color: var(--accent);
    margin-bottom: 0.3rem;
}
.subtitle {
    color: var(--text-muted);
    font-size: 0.95rem;
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
}
.stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.2rem;
    text-align: center;
}
.stat-card .value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
}
.stat-card .label {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.stat-card.green .value  { color: var(--green); }
.stat-card.blue .value   { color: var(--blue); }
.stat-card.red .value    { color: var(--red); }
.stat-card.purple .value { color: var(--purple); }
.chart-container {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
}
.chart-container h2 {
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 1rem;
}
.chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
}
@media (max-width: 800px) {
    .chart-row { grid-template-columns: 1fr; }
}
canvas { width: 100% !important; }
footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
}
</style>
</head>
<body>
<header>
    <h1>&#9889; zzigtop Stress Benchmark</h1>
    <p class="subtitle" id="reportDate"></p>
</header>

<!-- Summary Cards -->
<div class="grid" id="summaryCards"></div>

<!-- Charts -->
<div class="chart-row">
    <div class="chart-container">
        <h2>&#128200; Memory Usage (MB)</h2>
        <canvas id="memChart"></canvas>
    </div>
    <div class="chart-container">
        <h2>&#9889; CPU Usage (%)</h2>

</div>
<div class="chart-row">
    <div class="chart-container">
        <h2>&#128640; Throughput (req/s)</h2>

    </div>
    <div class="chart-container">
        <h2>&#128296; Concurrency &amp; Threads</h2>

</div>
<div class="chart-container">
    <h2>&#128202; Combined Overview</h2>

</div>

<footer>
    Generated by <strong>stress-benchmark.ps1</strong> &mdash; zzigtop HTTP server

// â”€â”€ Overview (normalized) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// Normalize each series to 0-100% of its own max for a combined view
function normalize(arr) {
    const max = Math.max(...arr, 1);
    return arr.map(v => (v / max) * 100);
}

// Align throughput to metric timestamps via nearest-match
const alignedRps = memLabels.map(t => {
    let closest = throughput[0] || { rps: 0 };
    let minDist = Infinity;
    throughput.forEach(s => {
        const d = Math.abs(s.t - t);
        if (d < minDist) { minDist = d; closest = s; }
    });
    return closest.rps;
});

new Chart(document.getElementById('overviewChart'), {
    type: 'line',
    data: {
        labels: memLabels,
        datasets: [
            {
                label: 'CPU (% of peak)',
                data: normalize(metrics.map(m => m.cpu)),
                borderColor: '#f7a41d',
                tension: 0.3, pointRadius: 0, borderWidth: 2
            },
            {
                label: 'RAM (% of peak)',
                data: normalize(memWorking),
                borderColor: '#60a5fa',
                tension: 0.3, pointRadius: 0, borderWidth: 2
            },
            {
                label: 'RPS (% of peak)',
                data: normalize(alignedRps),
                borderColor: '#4ade80',
                tension: 0.3, pointRadius: 0, borderWidth: 2
            }
        ]
    },
    options: {
        ...chartDefaults,
        scales: {
            x: chartDefaults.scales.x,
            y: { ...makeScale('% of Peak'), min: 0, max: 105 }
        }
    }
});
